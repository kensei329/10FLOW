<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <rect width="520" height="140" fill="#ffffff" rx="4"/>
  <!-- 10 superscript -->
  <text x="28" y="52" font-size="26" fill="#C9302C" font-weight="900" font-family="Georgia, 'Times New Roman', serif" letter-spacing="1">10</text>
  <!-- + cross -->
  <text x="30" y="84" font-size="30" fill="#C9302C" font-weight="900" font-family="Arial, sans-serif">+</text>
  <!-- F in red -->
  <text x="64" y="112" font-size="100" fill="#C9302C" font-weight="700" font-family="Georgia, 'Times New Roman', serif">F</text>
  <!-- LOW in dark -->
  <text x="128" y="112" font-size="100" fill="#111111" font-weight="700" font-family="Georgia, 'Times New Roman', serif">LOW</text>
</svg>
